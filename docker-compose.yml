version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET:-hs-docker-secret-2026}
    # Uncomment below to persist database across container restarts
    # volumes:
    #   - ./dev.db:/app/dev.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/programs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
